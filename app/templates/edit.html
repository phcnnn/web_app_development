{% extends "base.html" %}

{% block title %}編輯紀錄 - 快速小資記帳 QuickSpend{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-5">
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('main.index') }}" class="btn btn-link p-0 me-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                    </svg>
                </a>
                <h2 class="mb-0 fw-bold">編輯消費紀錄</h2>
            </div>

            <form action="{{ url_for('main.update_transaction', transaction_id=transaction.id) }}" method="POST">
                <div class="mb-4">
                    <label class="form-label fw-bold">金額</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text">$</span>
                        <input type="number" name="amount" class="form-control" value="{{ transaction.amount }}" required step="0.01">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">類別</label>
                    <select name="category" class="form-select" required>
                        {% set categories = ['餐飲', '交通', '購物', '娛樂', '居家', '其他'] %}
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if transaction.category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">備忘錄</label>
                    <input type="text" name="memo" class="form-control" value="{{ transaction.memo or '' }}" placeholder="編輯備註內容...">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">儲存變更</button>
                    <a href="{{ url_for('main.index') }}" class="btn btn-light btn-lg text-muted">取消編輯</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
